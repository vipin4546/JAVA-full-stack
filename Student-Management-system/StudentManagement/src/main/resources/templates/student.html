<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management System</title>
</head>
<body>

<h1>Student Management System</h1>

<form action="/student" method="post">

    <input
            type="text"
            name="name"
            placeholder="Enter Name">

    <input
            type="text"
            name="studentClass"
            placeholder="Enter Class">

    <input
            type="number"
            name="rollNumber"
            placeholder="Enter Roll Number">

    <button type="submit">
        Add Student
    </button>

</form>

<br>
<br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Class</th>
        <th>Roll Number</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.studentClass}"></td>
        <td th:text="${student.rollNumber}"></td>
        <td>
            <a th:href="@{/edit(id=${student.id})}">
                Edit
            </a>
        </td>
        <td>
            <a th:href="@{/delete(id=${student.id})}">
                Delete
            </a>
        </td>
    </tr>

</table>

</body>
</html>
