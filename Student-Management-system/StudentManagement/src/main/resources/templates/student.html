<h1>Student Management System</h1>
<form action="/student" method="post">

    <input
            type="text"
            name="name"
            placeholder="Enter Name">

    <input
            type="text"
            name="studentClass"
            placeholder="Enter Class">

    <input
            type="number"
            name="rollNumber"
            placeholder="Enter Roll Number">

    <button type="submit">
        Add Student
    </button>

</form>
